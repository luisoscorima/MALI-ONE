# Producción en EC2: web accesible desde Nginx Proxy Manager por red Docker compartida.
# NPM Forward Hostname: mali-one-web | Forward Port: 80

services:
  api:
    environment:
      NODE_ENV: production
      TRUST_PROXY: 'true'

  web:
    container_name: mali-one-web
    ports: !override []
    networks:
      - internal
      - npm

networks:
  npm:
    external: true
    name: nginx-proxy-manager_default
